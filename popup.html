<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      /* System font stack — uses the OS's native UI font. */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    /* Decorative L-shaped corner brackets */
    body::before,
    body::after,
    .corner-bl,
    .corner-br {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.25;
    }
    /* Top-left: borders on top and left */
    body::before {
      top: 4px; left: 4px;
      border-top: 2px solid #435ee5;
      border-left: 2px solid #435ee5;
    }
    /* Top-right: borders on top and right */
    body::after {
      top: 4px; right: 4px;
      border-top: 2px solid #435ee5;
      border-right: 2px solid #435ee5;
    }
    /* Bottom-left: borders on bottom and left */
    .corner-bl {
      bottom: 4px; left: 4px;
      border-bottom: 2px solid #435ee5;
      border-left: 2px solid #435ee5;
    }
    /* Bottom-right: borders on bottom and right */
    .corner-br {
      bottom: 4px; right: 4px;
      border-bottom: 2px solid #435ee5;
      border-right: 2px solid #435ee5;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-row + .toggle-row {
      margin-top: 8px;
    }
    .toggle-row label {
      cursor: pointer;
      user-select: none;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    /* Hide the native checkbox; the .slider provides the visual. */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background-color: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    /* Adjacent sibling selector: styles the slider when the hidden checkbox is checked. */
    input:checked + .slider {
      background-color: #435ee5;
    }
    input:checked + .slider::before {
      transform: translateX(18px);
    }
    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 12px 0;
    }

    /* Primary "Enabled" toggle — larger and more prominent. */
    .toggle-row.primary {
      font-size: 16px;
      font-weight: 600;
    }
    .toggle-row.primary .switch {
      width: 48px;
      height: 26px;
    }
    .toggle-row.primary .slider::before {
      width: 20px;
      height: 20px;
    }
    .toggle-row.primary input:checked + .slider::before {
      transform: translateX(22px);
    }

    /* Grouped options fieldset */
    .options {
      border: 1px solid #d0d4e4;
      border-radius: 8px;
      padding: 10px 12px;
      margin: 0;
    }
    .options legend {
      font-size: 11px;
      font-weight: 600;
      color: #8a8fa8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 4px;
    }
    .options .toggle-row {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <div class="toggle-row primary">
    <span>Enabled</span>
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>
  <hr class="divider">
  <fieldset class="options">
    <legend>Options</legend>
    <div class="toggle-row">
      <span>Autoplay GIFs</span>
      <label class="switch">
        <input type="checkbox" id="autoplayGifs">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Autoplay videos</span>
      <label class="switch">
        <input type="checkbox" id="autoplayVideos">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Loading animations</span>
      <label class="switch">
        <input type="checkbox" id="showLoadingIndicator">
        <span class="slider"></span>
      </label>
    </div>
  </fieldset>
  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
